[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 115200
upload_port = /dev/ttyUSB1

lib_deps =
    bodmer/TFT_eSPI @ ^2.5.43

build_flags =
  -D USER_SETUP_LOADED=1
  -D ESP32_PARALLEL=1
  
;   Driver de la pantalla
  -D ILI9341_DRIVER=1     
  
  -D TFT_WIDTH=240
  -D TFT_HEIGHT=320

  -D LOAD_GLCD=1  ; Fuente estándar 1
  -D LOAD_FONT2=1  ; Fuente pequeña y clara 2
  -D LOAD_FONT4=1  ; Fuente mediana 4
  -D LOAD_FONT6=1  ; Fuente grande para números 6
  
  ; === Pines de Control ===
  -D TFT_RD=4             
  -D TFT_WR=33            
  -D TFT_DC=32            
  -D TFT_CS=2             
  -D TFT_RST=15           
